<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Integrantes del Hogar</title>
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
   <style>
      *,
      *::before,
      *::after {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      body {
         font-family: 'Roboto', sans-serif;
         background: #f3f5f8;
         padding: 24px 32px;
         min-height: 100vh;
         display: flex;
         justify-content: center;
         align-items: center;
      }

      .container {
         max-width: 1440px;
         width: 100%;
         background: #fff;
         padding: 24px 32px;
         border-radius: 14px;
      }

      .header-brand {
         display: flex;
         align-items: center;
         gap: 12px;
         margin-top: 1rem;
         margin-bottom: 1.5rem;
      }

      .header-brand .logo {
         font-size: 42px;
         line-height: 1;
      }

      .header-brand h1 {
         font-size: 42px;
         font-weight: 900;
         color: #464646;
         letter-spacing: 2px;
         text-transform: uppercase;
      }

      .layout {
         display: grid;
         grid-template-columns: 53% 45%;
         align-items: start;
         gap: 2%;
      }

      #right-panel {
         display: flex;
         flex-direction: column;
      }

      .section {
         margin-bottom: 28px;
      }

      .section-title {
         font-size: 18px;
         font-weight: 700;
         color: #464646;
         margin-bottom: 10px;
      }

      .data-block {
         display: flex;
         flex-direction: column;
         gap: 6px;
      }

      .data-row {
         display: flex;
         gap: 6px;
      }

      .data-cell {
         flex: 1;
         background: #f4f6f9;
         border-radius: 8px;
         padding: 8px 14px;
         display: flex;
         align-items: baseline;
         gap: 6px;
         flex-wrap: wrap;
      }

      .lbl {
         font-size: 12.5px;
         font-weight: 600;
         color: #3C98DE;
         white-space: nowrap;
      }

      .val {
         font-size: 13px;
         font-weight: 400;
         color: #1a1a1a;
      }

      .int-grid {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 10px;
         align-content: start;
      }

      .int-card {
         display: flex;
         background: #f2f4f8;
         border-radius: 10px;
         overflow: hidden;
         padding: 10px;
         gap: 10px;
      }

      .int-photo {
         width: 100px;
         flex-shrink: 0;
         background: #b0b8c4;
         border-radius: 6px;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 6px;
      }

      .int-photo img {
         width: 100%;
         height: 100%;
         object-fit: cover;
         border-radius: 4px;
         display: block;
      }

      .int-photo .no-foto-wrap {
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         gap: 4px;
         width: 100%;
      }

      .int-photo svg {
         width: 48px;
         height: 48px;
      }

      .int-photo .no-foto-txt {
         font-size: 9px;
         color: #fff;
         text-align: center;
         font-weight: 500;
         line-height: 1.3;
      }

      .int-info {
         flex: 1;
         display: flex;
         flex-direction: column;
      }

      .i-lbl {
         font-size: 9px;
         font-weight: 700;
         color: #464646;
         letter-spacing: 0.5px;
         text-transform: uppercase;
         margin-top: 6px;
         line-height: 1;
      }

      .i-lbl:first-child {
         margin-top: 0;
      }

      .i-doc {
         font-size: 13px;
         font-weight: 700;
         color: #9B2929;
         line-height: 1.35;
      }

      .i-nombre {
         font-size: 12.5px;
         font-weight: 700;
         color: #27279C;
         text-transform: uppercase;
         line-height: 1.25;
      }

      .i-fnac {
         font-size: 12px;
         font-weight: 700;
         color: #5082B3;
         line-height: 1.35;
      }

      .i-gen {
         font-size: 12.5px;
         font-weight: 700;
         color: #14B77A;
         line-height: 1.35;
      }

      @media (max-width: 900px) {
         body {
            padding: 0;
         }

         .container {
            border-radius: 0;
         }

         .layout {
            grid-template-columns: 1fr;
         }
      }
   </style>
</head>

<body>
   <div class="container">
      <div class="layout">
         <div id="left-panel"></div>
         <div id="right-panel"></div>
      </div>
   </div>

   <script>
      const SVG_SILUETA = `
        <div class="no-foto-wrap">
         <svg fill="rgba(255,255,255,0.75)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" enable-background="new 0 0 52 52" xml:space="preserve">
         <path d="M50,43v2.2c0,2.6-2.2,4.8-4.8,4.8H6.8C4.2,50,2,47.8,2,45.2V43c0-5.8,6.8-9.4,13.2-12.2
            c0.2-0.1,0.4-0.2,0.6-0.3c0.5-0.2,1-0.2,1.5,0.1c2.6,1.7,5.5,2.6,8.6,2.6s6.1-1,8.6-2.6c0.5-0.3,1-0.3,1.5-0.1
            c0.2,0.1,0.4,0.2,0.6,0.3C43.2,33.6,50,37.1,50,43z M26,2c6.6,0,11.9,5.9,11.9,13.2S32.6,28.4,26,28.4s-11.9-5.9-11.9-13.2
            S19.4,2,26,2z"/>
         </svg>
          <div class="no-foto-txt">No hay foto<br>disponible</div>
        </div>`;

      function cell(label, value) {
         return `<div class="data-cell">
            <span class="lbl">${label}:</span>
            <span class="val">${value ?? '—'}</span>
         </div>`;
      }

      function row2(l1, v1, l2, v2) {
         return `<div class="data-row">${cell(l1, v1)}${cell(l2, v2)}</div>`;
      }

      function row1(l, v) {
         return `<div class="data-row">${cell(l, v)}</div>`;
      }

      function block(rows) {
         return `<div class="data-block">${rows}</div>`;
      }

      window.renderFromData = function (raw) {
         const d = Array.isArray(raw.listaAni) ? raw.listaAni[0] : raw.listaAni;
         const h = d.hogar;
         const cse = h.clasificacion_socioeconomica || {};
         const emp = h.empadronamiento || {};
         const titular = [h.nombres_titular, h.apellido_paterno_titular, h.apellido_materno_titular]
            .filter(Boolean).join(' ');

         document.getElementById('left-panel').innerHTML = `
            <div class="section">
               <div class="section-title">
                  <div class="header-brand">
                     <span class="logo">🏠</span>
                     <h1>Integrantes de Hogar</h1>
                  </div>
                  <div>🪪 Identificación</div>
               </div>
               ${block(
            row2('Nombre', titular, 'DNI', h.documento_titular) +
            row2('Fecha de Nacimiento', h.fecha_nacimiento_titular, 'Sexo', h.sexo_titular) +
            row2('Código de CSE', h.codigo_cse, 'Código de Hogar', h.codigo_hogar) +
            row2('Fecha de Empadronamiento', h.fecha_empadronamiento, 'Estado del Hogar', h.hogar_estado)
         )}
            </div>
            <div class="section">
               <div class="section-title">📊 Clasificación</div>
               ${block(
            row2('Área', cse.area, 'Clasificación Socioeconómica', cse.clasificacion) +
            row2('Estado de la CSE', cse.estado, 'Fecha de Inicio de Vigencia', cse.fecha_inicio_vigencia) +
            row2('Fecha de Fin de Vigencia', cse.fecha_fin_vigencia, 'Número de Tipo de Formato', cse.nro_formato)
         )}
            </div>
            <div class="section">
               <div class="section-title">📍 Empadronamiento</div>
               ${block(
            row2('Departamento', emp.departamento, 'Provincia', emp.provincia) +
            row2('Distrito', emp.distrito, 'Centro Poblado', emp.centro_poblado) +
            row2('Ubigeo', emp.ubigeo, 'Tipo de Carga', emp.tipo_carga) +
            row1('Dirección', emp.direccion)
         )}
            </div>`;

         const right = document.getElementById('right-panel');
         right.innerHTML = '';

         const grid = document.createElement('div');
         grid.className = 'int-grid';

         (h.integrantes || []).slice(0, 8).forEach(p => {
            const nombre = [p.nombres, p.apellido_paterno, p.apellido_materno].filter(Boolean).join(' ');
            const card = document.createElement('div');
            card.className = 'int-card';
            const fotoHTML = p.foto ? `<img src="${p.foto}" alt="foto"/>` : SVG_SILUETA;

            card.innerHTML = `
               <div class="int-photo">${fotoHTML}</div>
               <div class="int-info">
                  <div class="i-lbl">TIPO / DOCUMENTO</div>
                  <div class="i-doc">${p.tipo_documento} / ${p.documento}</div>
                  <div class="i-lbl">NOMBRES Y APELLIDOS</div>
                  <div class="i-nombre">${nombre}</div>
                  <div class="i-lbl">FECHA NACIMIENTO</div>
                  <div class="i-fnac">${p.fecha_nacimiento}</div>
                  <div class="i-lbl">GENERO</div>
                  <div class="i-gen">${p.genero}</div>
               </div>`;

            grid.appendChild(card);
         });

         const total = (h.integrantes || []).length;

         if (total <= 6) {
            const spacer = document.createElement('div');
            spacer.style.cssText = 'padding-top: 122.5px;';
            right.appendChild(spacer);
         }


         right.appendChild(grid);
      };

      async function init() {
         try {
            const res = await fetch('../test/hogar.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            renderFromData(await res.json());
         } catch (err) {
            document.getElementById('left-panel').innerHTML =
               `<p style="color:#c00;font-size:14px;padding:16px">
                  ⚠️ No se pudo cargar <strong>hogar.json</strong>: ${err.message}
               </p>`;
         }
      }

      init();
   </script>
</body>

</html>
