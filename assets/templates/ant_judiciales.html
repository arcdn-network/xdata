<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <title>CERTIFICADO</title>
   <style>
      body {
         margin: 0;
         background: #1e1e1e;
         display: flex;
         justify-content: center;
         padding: 20px;
         font-family: Arial, sans-serif;
         font-size: 24px;
         font-weight: bold;
         min-height: 100vh;
         box-sizing: border-box;
      }

      .page {
         width: 960px;
         position: relative;
         height: calc(960px * 5846 / 4134);
         background: url('../images/antecedentes/judiciales.png') no-repeat center/100% 100%;
         background-color: #fff;
      }

      .bloque {
         position: absolute;
         color: #000;
      }

      /* FOTO */
      #foto-container {
         position: absolute;
         top: 20%;
         left: 10%;
         width: 130px;
         overflow: hidden;
      }

      #foto-container img {
         width: 100%;
         height: 100%;
         object-fit: cover;
      }

      /* APELLIDOS / NOMBRE / DNI */
      #b-apellido1 {
         top: 35.5%;
         left: 4.15%;
         width: 50%;
         text-align: center;
      }

      #b-apellido2 {
         top: 35.5%;
         right: 1.75%;
         width: 50%;
         text-align: center;
      }

      #b-nombre {
         top: 41.75%;
         width: 50%;
         text-align: center;
         left: 26.5%;
      }

      #b-dni {
         top: 46.6%;
         left: 42%;
      }
   </style>
</head>

<body>

   <div class="page">

      <!-- FOTO -->
      <div id="foto-container">
         <img id="img-foto" src="">
      </div>

      <!-- APELLIDOS -->
      <div id="b-apellido1" class="bloque"></div>
      <div id="b-apellido2" class="bloque"></div>

      <!-- NOMBRE -->
      <div id="b-nombre" class="bloque"></div>

      <!-- DNI -->
      <div id="b-dni" class="bloque"></div>

   </div>

   <script>
      window.renderFromData = function (raw) {
         if (!raw) return;
         const d = Array.isArray(raw.listaAni) ? raw.listaAni[0] : raw.listaAni;

         // FOTO
         const foto = document.getElementById('img-foto');
         if (raw.foto) {
            foto.src = raw.foto.startsWith('data:')
               ? raw.foto
               : `data:image/jpeg;base64,${raw.foto}`;
         }

         // DATOS
         document.getElementById('b-apellido1').textContent = d.apePaterno ?? '';
         document.getElementById('b-apellido2').textContent = d.apeMaterno ?? '';
         document.getElementById('b-nombre').textContent = d.preNombres ?? '';
         document.getElementById('b-dni').textContent = d.nuDni ?? '';
      };

      async function init() {
         try {
            const res = await fetch("../test/reniec.json");
            const data = await res.json();
            renderFromData(data);
         } catch (err) {
            console.error(err);
         }
      }

      init();
   </script>

</body>

</html>
