<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <title>DNI Virtual - Completo</title>
   <style>
      @font-face {
         font-family: 'ArialCustom';
         src: url('../fonts/arialbd.ttf') format('truetype');
      }

      @font-face {
         font-family: 'OCR-B';
         src: url('../fonts/OCR-B.otf') format('opentype');
         font-weight: normal;
         font-style: normal;
      }

      body {
         margin: 0;
         background: #1e1e1e;
         display: flex;
         flex-direction: column;
         align-items: center;
         gap: 40px;
         padding: 40px 0;
         font-family: 'ArialCustom';
      }

      .dni-wrapper {
         position: relative;
         width: 100%;
         max-width: 1240px;
         aspect-ratio: 1240 / 780;
         container-type: inline-size;
      }

      .dni-wrapper img.plantilla {
         width: 100%;
         height: 100%;
         display: block;
      }

      /* ══════════════════════════════
         ANVERSO
      ══════════════════════════════ */
      #anverso .campo {
         position: absolute;
         font-weight: bold;
         font-size: 2.1cqi;
         color: #010101;
         white-space: nowrap;
      }

      #foto-wrapper {
         position: absolute;
         left: 5%;
         top: 16%;
         width: 20.56%;
         height: 46%;
      }

      #foto {
         width: 100%;
         height: 100%;
         object-fit: cover;
         display: block;
      }

      #foto-wrapper::after {
         content: '';
         position: absolute;
         inset: 0;
         background: repeating-linear-gradient(-45deg,
               rgba(100, 180, 220, 0.2) 0px,
               rgba(100, 180, 220, 0.2) 2px,
               transparent 1px,
               transparent 12px);
         pointer-events: none;
      }

      #dniVertical {
         position: absolute;
         left: 30px;
         width: 5%;
         top: 16.5%;
         height: 45.75%;
         display: flex;
         align-items: center;
         justify-content: center;
         writing-mode: vertical-rl;
         font-weight: bold;
         font-size: 36px;
         color: #931109;
         letter-spacing: 15px;
         white-space: nowrap;
      }

      #apellidoFoto {
         position: absolute;
         bottom: -4%;
         left: 0;
         width: 100%;
         text-align: center;
         font-weight: bold;
         font-size: 2cqi;
         color: #931109;
         white-space: nowrap;
      }

      #fotoChica-wrapper {
         position: absolute;
         right: 6.5%;
         top: 50%;
         width: 9%;
         height: 16%;
      }

      #fotoChica {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
         background: transparent;
         mix-blend-mode: multiply;
         filter: brightness(1.4) contrast(0.9);
      }

      #firma {
         position: absolute;
         left: 58%;
         top: 52%;
         width: 18%;
         height: 10%;
         object-fit: contain;
      }

      #numeroDni {
         position: absolute;
         right: 7%;
         top: 9.5%;
         font-weight: bold;
         font-size: 2.8cqi;
         white-space: nowrap;
         letter-spacing: 1px;
      }

      #mrz-wrapper {
         font-family: 'OCR-B', sans-serif;
         font-weight: 500;
         font-size: 3.55cqi;
         letter-spacing: 1px;
         line-height: 1.5;
         white-space: pre;
         color: #010101;
         position: absolute;
         left: 5%;
         bottom: 7%;
         width: 90%;
      }

      #apePaterno {
         left: 26.25%;
         top: 19%;
      }

      #apeMaterno {
         left: 26.25%;
         top: 30.5%;
      }

      #preNombres {
         left: 26.25%;
         top: 41.25%;
      }

      #feNacimiento {
         left: 26.25%;
         top: 52.5%;
      }

      #ubigeo {
         left: 42%;
         top: 52.5%;
      }

      #sexo {
         left: 26.25%;
         top: 60%;
      }

      #estadoCivil {
         left: 36.75%;
         top: 60%;
      }

      #bloqueFechas {
         position: absolute;
         right: 4.5%;
         top: 21%;
         width: 16%;
         height: 20%;
         text-align: center;
         display: flex;
         flex-direction: column;
         justify-content: center;
         gap: 27%;
      }

      #bloqueFechas .campo {
         position: static;
         display: block;
         width: 100%;
      }

      /* ══════════════════════════════
         REVERSO — estilos base
      ══════════════════════════════ */
      #reverso .campo {
         position: absolute;
         font-weight: bold;
         font-size: 2.1cqi;
         white-space: nowrap;
      }

      /* Color global del reverso: todos los hijos lo heredan */
      #reverso[data-tipo="adulto"] {
         color: #28352E;
      }

      #reverso[data-tipo="menor"] {
         color: #000000;
      }

      #huella-wrapper {
         position: absolute;
         width: 10%;
         height: 30%;
      }

      #reverso[data-tipo="adulto"] #huella-wrapper {
         right: 10.5%;
         top: 5%;
      }

      #reverso[data-tipo="menor"] #huella-wrapper {
         right: 12%;
         top: 6%;
      }

      #huella {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
      }

      /* ══════════════════════════════
         REVERSO ADULTO — campos
      ══════════════════════════════ */
      .adulto-only {
         display: block;
      }

      #departamento {
         left: 4.5%;
         top: 42%;
      }

      #provincia {
         left: 25%;
         top: 42%;
      }

      #distrito {
         left: 53.6%;
         top: 42%;
      }

      #direccion {
         left: 4.5%;
         top: 51.5%;
      }

      #donaOrganos {
         left: 26%;
         top: 63.5%;
      }

      #grupoVotacion {
         right: 25%;
         top: 63.5%;
      }

      /* ══════════════════════════════
         REVERSO MENOR — campos (ocultos por defecto)
      ══════════════════════════════ */
      .menor-only {
         display: none;
      }

      .bloque-progenitor {
         position: absolute;
         left: 11.2%;
         display: flex !important;
         flex-direction: column;
         font-weight: bold;
         font-size: 2.1cqi;
         white-space: nowrap;
      }

      #bloqueMadre {
         top: 5%;
      }

      #bloquePadre {
         top: 22%;
      }

      #nuDocMadre {
         left: 19.25%;
         top: 18%;
         font-size: 2.1cqi;
      }

      #nuDocPadre {
         left: 19.25%;
         top: 35%;
         font-size: 2.1cqi;
      }

      #domicilioMenor {
         left: 4%;
         top: 44%;
         font-size: 2.1cqi;
      }

      #distMenor {
         left: 4%;
         top: 57%;
         font-size: 2.1cqi;
      }

      #provMenor {
         left: 33%;
         top: 57%;
         font-size: 2.1cqi;
      }

      #depaMenor {
         left: 64.6%;
         top: 57%;
         font-size: 2.1cqi;
      }

      #reverso[data-tipo="menor"] .adulto-only {
         display: none;
      }

      #reverso[data-tipo="menor"] .menor-only {
         display: block;
      }

      #anverso[data-tipo="menor"] #ubigeo,
      #anverso[data-tipo="menor"] #estadoCivil {
         display: none;
      }
   </style>
</head>

<body>

   <!-- ══════════ ANVERSO ══════════ -->
   <div class="dni-wrapper" id="anverso">
      <img class="plantilla" src="../images/dni_virtual1.png" alt="plantilla anverso">

      <div id="foto-wrapper">
         <img id="foto" src="" alt="foto">
         <span id="apellidoFoto"></span>
      </div>

      <span id="dniVertical"></span>

      <div id="fotoChica-wrapper">
         <img id="fotoChica" src="" alt="foto chica">
      </div>

      <img id="firma" src="" alt="firma">

      <span id="numeroDni"></span>

      <span class="campo" id="apePaterno"></span>
      <span class="campo" id="apeMaterno"></span>
      <span class="campo" id="preNombres"></span>
      <span class="campo" id="feNacimiento"></span>
      <span class="campo" id="ubigeo"></span>
      <span class="campo" id="sexo"></span>
      <span class="campo" id="estadoCivil"></span>

      <div id="bloqueFechas">
         <span class="campo" id="feInscripcion"></span>
         <span class="campo" id="feEmision"></span>
         <span class="campo" id="feCaducidad" style="color:#931109;"></span>
      </div>

      <div id="mrz-wrapper"></div>
   </div>

   <!-- ══════════ REVERSO ══════════ -->
   <div class="dni-wrapper" id="reverso" data-tipo="adulto">
      <img class="plantilla" src="../images/dni_virtual2.png" alt="plantilla reverso">

      <!-- ── Huella (común a ambos tipos) ── -->
      <div id="huella-wrapper">
         <img id="huella" src="" alt="huella digital">
      </div>

      <!-- ══ CAMPOS ADULTO ══ -->
      <span class="campo adulto-only" id="departamento"></span>
      <span class="campo adulto-only" id="provincia"></span>
      <span class="campo adulto-only" id="distrito"></span>
      <span class="campo adulto-only" id="direccion"></span>
      <span class="campo adulto-only" id="donaOrganos"></span>
      <span class="campo adulto-only" id="grupoVotacion"></span>

      <!-- ══ CAMPOS MENOR ══ -->
      <div class="menor-only bloque-progenitor" id="bloqueMadre">
         <span id="nomMadreLn1"></span>
         <span id="nomMadreLn2"></span>
         <span id="nomMadreLn3"></span>
      </div>
      <span class="campo menor-only" id="nuDocMadre"></span>

      <div class="menor-only bloque-progenitor" id="bloquePadre">
         <span id="nomPadreLn1"></span>
         <span id="nomPadreLn2"></span>
         <span id="nomPadreLn3"></span>
      </div>
      <span class="campo menor-only" id="nuDocPadre"></span>

      <span class="campo menor-only" id="domicilioMenor"></span>
      <span class="campo menor-only" id="distMenor"></span>
      <span class="campo menor-only" id="provMenor"></span>
      <span class="campo menor-only" id="depaMenor"></span>

   </div>

   <script>
      /* ─────────────────────────────────────────
         UTILIDADES
      ───────────────────────────────────────── */
      function calcularEdad(fechaNacStr) {
         const [dd, mm, yyyy] = fechaNacStr.split('/').map(Number);
         const hoy = new Date();
         let edad = hoy.getFullYear() - yyyy;
         const mesDif = hoy.getMonth() + 1 - mm;
         if (mesDif < 0 || (mesDif === 0 && hoy.getDate() < dd)) edad--;
         return edad;
      }

      function removeWhiteBackground(base64, threshold = 200) {
         return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
               const canvas = document.createElement('canvas');
               canvas.width = img.width;
               canvas.height = img.height;
               const ctx = canvas.getContext('2d');
               ctx.drawImage(img, 0, 0);
               const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
               const data = imageData.data;
               for (let i = 0; i < data.length; i += 4) {
                  const r = data[i], g = data[i + 1], b = data[i + 2];
                  if (r > threshold && g > threshold && b > threshold) data[i + 3] = 0;
               }
               ctx.putImageData(imageData, 0, 0);
               resolve(canvas.toDataURL('image/png'));
            };
            img.src = base64;
         });
      }

      const fmtFechaDisplay = f => {
         const [dd, mm, yyyy] = f.split('/');
         return `${dd} ${mm} ${yyyy}`;
      };

      /* ─────────────────────────────────────────
         MRZ
      ───────────────────────────────────────── */
      function buildMRZ(d) {
         const MRZ_LEN = 28;
         const pad = (str, len) => str.padEnd(len, '<').slice(0, len);
         const cleanStr = str => str.normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/Ñ/g, 'N')
            .replace(/[^A-Z0-9]/gi, '<')
            .toUpperCase();
         const fmtFecha = f => {
            const [dd, mm, yyyy] = f.split('/');
            return `${yyyy.slice(2)}${mm}${dd}`;
         };
         const charValue = c => {
            if (c === '<') return 0;
            if (/[0-9]/.test(c)) return parseInt(c);
            return c.charCodeAt(0) - 55;
         };
         const checksum = str => {
            const weights = [7, 3, 1];
            let sum = 0;
            for (let i = 0; i < str.length; i++) {
               sum += charValue(str[i]) * weights[i % 3];
            }
            return sum % 10;
         };
         function normalizarDatos(d) {
            let apePat = (d.apePaterno || '').toUpperCase();
            let apeMat = (d.apeMaterno || '').toUpperCase();
            let nombres = (d.preNombres || '').toUpperCase();
            if (apeMat.includes('VDA')) { nombres += ' ' + apeMat; apeMat = ''; }
            apePat = apePat.replace(/\s+/g, ' ').trim();
            apeMat = apeMat.replace(/\s+/g, ' ').trim();
            nombres = nombres.replace(/\s+/g, ' ').trim();
            return { ...d, apePaterno: apePat, apeMaterno: apeMat, preNombres: nombres };
         }
         d = normalizarDatos(d);
         const dni = (d.nuDni || '').padStart(8, '0');
         const dniCheck = checksum(dni);
         const fechaNac = fmtFecha(d.feNacimiento);
         const fechaNacCheck = checksum(fechaNac);
         const fechaCad = fmtFecha(d.feCaducidad);
         const fechaCadCheck = checksum(fechaCad);
         const sexo = d.sexo?.toUpperCase().startsWith('M') ? 'M' : 'F';
         const apePat = cleanStr(d.apePaterno);
         const apeMat = cleanStr(d.apeMaterno);
         const nombres = cleanStr(d.preNombres).replace(/ /g, '<');
         const linea1 = pad(`I<PER${dni}${dniCheck}`, MRZ_LEN);
         const baseLinea2 = `${fechaNac}${fechaNacCheck}${sexo}${fechaCad}${fechaCadCheck}PER`;
         const parcial = pad(baseLinea2, MRZ_LEN - 1);
         const globalCheck = checksum(parcial);
         const linea2 = parcial + globalCheck;
         const base = `${apePat}<${apeMat}<<`;
         const espacio = MRZ_LEN - base.length;
         const nombresRecortados = nombres.slice(0, espacio);
         const linea3 = (base + nombresRecortados).padEnd(MRZ_LEN, '<');
         return `${linea1}\n${linea2}\n${linea3}`;
      }

      function splitNombreCompleto(nombreCompleto) {
         const palabras = (nombreCompleto || '').trim().toUpperCase().split(/\s+/);
         const ln1 = palabras[0] || '';
         const ln2 = palabras[1] || '';
         const ln3 = palabras.slice(2).join(' ');
         return [ln1, ln2, ln3];
      }

      /* ─────────────────────────────────────────
         RENDER PRINCIPAL
      ───────────────────────────────────────── */
      window.renderFromData = async function (raw) {
         if (!raw) {
            try {
               const res = await fetch('../test/reniec.json');
               raw = await res.json();
            } catch (err) {
               console.error('Error cargando reniec.json:', err);
               return;
            }
         }

         const d = Array.isArray(raw.listaAni) ? raw.listaAni[0] : raw.listaAni;
         const esMenor = calcularEdad(d.feNacimiento) < 18;

         /* ── 1. Plantillas de imagen según tipo ── */
         document.querySelector('#anverso .plantilla').src =
            esMenor ? '../images/dni_amarillo1.png' : '../images/dni_virtual1.png';
         document.querySelector('#reverso .plantilla').src =
            esMenor ? '../images/dni_amarillo2.png' : '../images/dni_virtual2.png';

         /* ── 2. Activar modo visual del reverso ── */
         document.getElementById('reverso').dataset.tipo = esMenor ? 'menor' : 'adulto';
         document.getElementById('anverso').dataset.tipo = esMenor ? 'menor' : 'adulto';

         /* ══════════════════════════════
            ANVERSO (igual para ambos)
         ══════════════════════════════ */
         document.getElementById('apePaterno').textContent = d.apePaterno;
         document.getElementById('apeMaterno').textContent = d.apeMaterno;
         document.getElementById('preNombres').textContent = d.preNombres;
         document.getElementById('feNacimiento').textContent = fmtFechaDisplay(d.feNacimiento);
         document.getElementById('ubigeo').textContent = raw.ubigeoNacimiento?.UbigeoInei ?? '';
         document.getElementById('sexo').textContent = d.sexo === 'MASCULINO' ? 'M' : 'F';
         document.getElementById('estadoCivil').textContent = d.estadoCivil === 'SOLTERO' ? 'S' : 'C';
         document.getElementById('feInscripcion').textContent = fmtFechaDisplay(d.feInscripcion);
         document.getElementById('feEmision').textContent = fmtFechaDisplay(d.feEmision);
         document.getElementById('feCaducidad').textContent = fmtFechaDisplay(d.feCaducidad);

         document.getElementById('numeroDni').innerHTML =
            `<span style="color:#931109;">${d.nuDni}</span>` +
            `<span style="color:#010101;">-${d.digitoVerificacion}</span>`;

         document.getElementById('dniVertical').textContent = d.nuDni;
         document.getElementById('apellidoFoto').textContent = d.apePaterno;
         document.getElementById('mrz-wrapper').textContent = buildMRZ(d);

         if (raw.foto) {
            document.getElementById('foto').src = 'data:image/jpeg;base64,' + raw.foto;
            const fotoChicaSrc = await removeWhiteBackground('data:image/jpeg;base64,' + raw.foto);
            document.getElementById('fotoChica').src = fotoChicaSrc;
         }
         if (raw.firma) {
            const firmaSrc = await removeWhiteBackground('data:image/png;base64,' + raw.firma);
            document.getElementById('firma').src = firmaSrc;
         }

         /* ══════════════════════════════
            REVERSO ADULTO
         ══════════════════════════════ */
         if (!esMenor) {
            document.getElementById('departamento').textContent = d.depaDireccion;
            document.getElementById('provincia').textContent = d.provDireccion;
            document.getElementById('distrito').textContent = d.distDireccion;
            document.getElementById('direccion').textContent = d.desDireccion;
            document.getElementById('donaOrganos').textContent = d.donaOrganos;
            document.getElementById('grupoVotacion').textContent = raw.ubigeoDomicilio?.UbigeoInei ?? '';
         }

         /* ══════════════════════════════
            REVERSO MENOR
         ══════════════════════════════ */
         if (esMenor) {
            /* Madre — d.nomMadre = "NUÑEZ VILCAPOMA CLOTILDE ROBERTA" */
            const [mLn1, mLn2, mLn3] = splitNombreCompleto(d.nomMadre);
            document.getElementById('nomMadreLn1').textContent = mLn1;
            document.getElementById('nomMadreLn2').textContent = mLn2;
            document.getElementById('nomMadreLn3').textContent = mLn3;
            document.getElementById('nuDocMadre').textContent = d.nuDocMadre ?? '';

            /* Padre — d.nomPadre = "CAMPOS VILLAR LUIS ALBERTO" */
            const [pLn1, pLn2, pLn3] = splitNombreCompleto(d.nomPadre);
            document.getElementById('nomPadreLn1').textContent = pLn1;
            document.getElementById('nomPadreLn2').textContent = pLn2;
            document.getElementById('nomPadreLn3').textContent = pLn3;
            document.getElementById('nuDocPadre').textContent = d.nuDocPadre ?? '';

            /* Domicilio y ubigeo del menor */
            document.getElementById('domicilioMenor').textContent = d.desDireccion ?? '';
            document.getElementById('distMenor').textContent = d.distDireccion ?? '';
            document.getElementById('provMenor').textContent = d.provDireccion ?? '';
            document.getElementById('depaMenor').textContent = d.depaDireccion ?? '';
         }

         /* ── Huella (común) ── */
         if (raw.hderecha) {
            document.getElementById('huella').src = 'data:image/png;base64,' + raw.hderecha;
         }
      };

      document.addEventListener('DOMContentLoaded', () => {
         if (typeof window.__dniData === 'undefined') {
            window.renderFromData();
         }
      });
   </script>

</body>

</html>
