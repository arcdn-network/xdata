<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <title>CERTIFICADO DE INSCRIPCIÓN</title>

   <style>
      @font-face {
         font-family: 'ArialCustom';
         src: url('../fonts/arial.ttf') format('truetype');
      }

      body {
         margin: 0;
         background: #1e1e1e;
         display: flex;
         justify-content: center;
         padding: 20px;
         font-family: 'ArialCustom';
         font-size: 11px;
         min-height: 100vh;
         box-sizing: border-box;
      }

      .page {
         width: 960px;
         position: relative;
         height: calc(960px * 5846 / 4134);
         background: url('../images/ficha_c4f.png') no-repeat center/100% 100%;
         background-color: #fff;
      }

      .bloque {
         position: absolute;
         white-space: pre;
         color: #000;
      }

      .row {
         font-size: 12px;
         line-height: 1.4;
         font-weight: bold;
      }

      .col {
         font-size: 10px;
         line-height: 1.78;
      }

      #b1 {
         top: 18.4%;
         left: 23.8%;
      }

      #b2 {
         top: 23.6%;
         left: 18.64%;
      }

      #b3 {
         top: 27.57%;
         left: 27.35%;
      }

      #b4 {
         top: 27.5%;
         left: 53.3%;
      }

      #b5 {
         top: 38.6%;
         left: 27.4%;
      }

      #b6 {
         top: 70%;
         left: 13.5%;
      }

      #b7 {
         top: 73.65%;
         left: 17.4%;
      }


      #b8 {
         bottom: 1.6%;
         left: 22.4%;
      }

      /* CONTENEDORES */
      .media-box {
         position: absolute;
         overflow: hidden;
      }

      /* FOTO */
      #foto-container {
         top: 43.2%;
         left: 20%;
         width: 21%;
         height: 21%;
         border: 1px solid black;
      }

      /* FIRMA */
      #firma-container {
         top: 50%;
         left: 56%;
         width: 12%;
         height: 10%;
      }

      /* IMÁGENES */
      .media-box img {
         width: 100%;
         height: 100%;
         object-fit: cover;
      }

      /* WATERMARK BASE */
      .wm {
         position: absolute;
         color: rgba(150, 150, 150, 0.5);
         font-weight: bold;
         pointer-events: none;
         white-space: nowrap;
      }

      /* TOP */
      .wm-top {
         top: 3%;
         left: 50%;
         transform: translateX(-50%);
         font-size: 18px;
      }

      /* VERTICALES */
      .vertical {
         writing-mode: vertical-rl;
         text-orientation: mixed;
         top: 50%;
         transform: translateY(-50%);
         font-size: 16px;
      }

      .wm-left {
         left: 2px;
      }

      .wm-right {
         right: 2px;
      }

      /* DIAGONAL */
      .wm-diagonal {
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%) rotate(35deg);
         font-size: 28px;
         color: rgba(255, 0, 0, 0.35);
         letter-spacing: 3px;
      }

      /* CAJA FIRMA GRANDE */
      #firma-box {
         position: absolute;
         top: 48.6%;
         left: 45.75%;
         width: 31.9%;
         height: 7.5%;
         border: 1px solid black;
         background: #fff;
         overflow: hidden;
      }

      /* FIRMA ENCIMA */
      #firma-box img {
         position: absolute;
         top: 50%;
         left: 50%;
         width: 35%;
         transform: translate(-50%, -50%);
         z-index: 2;
         object-fit: contain;
      }

      /* WATERMARK base */
      #firma-box .wm {
         position: absolute;
         color: rgba(150, 150, 150, 0.5);
         font-weight: bold;
         pointer-events: none;
         white-space: nowrap;
         z-index: 1;
      }

      /* TOP */
      #firma-box .wm-top {
         top: 5%;
         left: 50%;
         transform: translateX(-50%);
         font-size: 9px;
      }

      /* VERTICALES */
      #firma-box .vertical {
         writing-mode: vertical-rl;
         text-orientation: mixed;
         top: 50%;
         transform: translateY(-50%);
         font-size: 9px;
      }

      #firma-box .wm-left {
         left: 4px;
      }

      #firma-box .wm-right {
         right: 4px;
      }

      /* DIAGONAL */
      #firma-box .wm-diagonal {
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%) rotate(35deg);
         color: rgba(255, 0, 0, 0.25);
         font-size: 15px;
         letter-spacing: 3px;
         z-index: 5;
      }
   </style>
</head>

<body>

   <div class="page">

      <div id="b1" class="bloque row"></div>
      <div id="b2" class="bloque row"></div>
      <div id="b3" class="bloque col"></div>
      <div id="b4" class="bloque col"></div>
      <div id="b5" class="bloque col"></div>
      <div id="b6" class="bloque col"></div>
      <div id="b7" class="bloque col"></div>
      <div id="b8" class="bloque col"></div>

      <div id="foto-container" class="media-box">
         <img id="img-foto">
         <div class="wm wm-top"></div>
         <div class="wm wm-left vertical"></div>
         <div class="wm wm-right vertical"></div>
         <div class="wm wm-diagonal"></div>
      </div>

      <div id="firma-box" class="media-box">
         <div class="wm wm-top"></div>
         <div class="wm wm-left vertical"></div>
         <div class="wm wm-right vertical"></div>
         <div class="wm wm-diagonal"></div>

         <img id="img-firma">
      </div>

   </div>

   <script>
      function setImg(id, b64, mime) {
         if (!b64) return;
         document.getElementById(id).src =
            b64.startsWith("data:") ? b64 : `data:${mime};base64,${b64}`;
      }

      function randomCode() {
         return Math.floor(10000000 + Math.random() * 90000000);
      }

      function randomSerie() {
         const part = () => Math.floor(100000 + Math.random() * 900000);
         return `${part()}.${part()}.${part()}`;
      }

      function fechaHoraActual() {
         const f = new Date();
         const pad = n => n.toString().padStart(2, "0");
         return `${pad(f.getDate())}/${pad(f.getMonth() + 1)}/${f.getFullYear()} ${pad(f.getHours())}:${pad(f.getMinutes())}:${pad(f.getSeconds())}`;
      }

      function fechaHoyTexto() {
         const fecha = new Date();
         const dia = fecha.getDate();
         const anio = fecha.getFullYear();
         const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
         const mes = meses[fecha.getMonth()];
         return `Expedido de la SUNAT a los ${dia} días del mes de ${mes} del ${anio}`;
      }

      function aplicarWatermark(d) {
         const year = new Date().getFullYear();
         const fecha = fechaHoraActual();

         document.querySelectorAll(".wm-top").forEach(el => {
            el.textContent = `RENIEC ${year}`;
         });

         document.querySelectorAll(".wm-left").forEach(el => {
            el.textContent = `RENIEC ${year}`;
         });

         document.querySelectorAll(".wm-right").forEach(el => {
            el.textContent = fecha;
         });

         document.querySelectorAll(".wm-diagonal").forEach(el => {
            el.textContent = d.nuDni;
         });
      }

      // ✅ SINCRÓNICA (CLAVE)
      window.renderFromData = function (raw) {
         if (!raw) return; // 👈 importante

         try {
            const d = Array.isArray(raw.listaAni) ? raw.listaAni[0] : raw.listaAni;

            const ubigeoDomicilio = raw.ubigeoDomicilio?.UbigeoReniec ?? "";
            const ubigeoVotacion = raw.ubigeoDomicilio?.UbigeoInei ?? "";

            document.getElementById("b1").textContent = randomCode();

            document.getElementById("b2").textContent =
               `${d.nuDni}\n     ${d.apePaterno} ${d.apeMaterno} ${d.preNombres}`;

            document.getElementById("b3").textContent = [
               d.feNacimiento,
               d.sexo,
               d.estadoCivil,
               d.feInscripcion,
               ubigeoDomicilio,
               d.desDireccion ?? "",
               d.feCaducidad ?? "",
               `**`,
            ].join("\n");

            document.getElementById("b4").textContent = [
               d.estatura,
               d.gradoInstruccion ?? "",
               "**",
               ubigeoVotacion,
            ].join("\n");

            document.getElementById("b5").innerHTML =
               `** <span style="margin-left: 246px;">${d.deRestriccion ?? "NINGUNA"}</span>`;

            document.getElementById("b6").textContent = fechaHoyTexto();

            document.getElementById("b7").textContent =
               `${d.apePaterno} ${d.apeMaterno} ${d.preNombres}`;

            document.getElementById("b8").textContent = [
               "https://serviciosportal.reniec.gob.pe/verificacionqr",
               randomSerie(),
               "1 de 1",
               `${d.apePaterno} ${d.apeMaterno} ${d.preNombres}`,
               `${d.nuDni} - ${d.digitoVerificacion}`,
               fechaHoraActual()
            ].join("\n");

            setImg("img-foto", raw.foto, "image/jpeg");
            setImg("img-firma", raw.firma, "image/png");

            aplicarWatermark(d);

         } catch (err) {
            document.body.innerHTML = `
         <p style="color:#c00;font-size:14px;padding:16px">
            ⚠️ Error en render: ${err.message}
         </p>`;
         }
      };

      // ✅ SOLO PARA MODO LOCAL (no afecta puppeteer)
      async function init() {
         try {
            const res = await fetch("../test/reniec.json");
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderFromData(data);
         } catch (err) {
            console.error(err);
         }
      }

      init();
   </script>

</body>

</html>
